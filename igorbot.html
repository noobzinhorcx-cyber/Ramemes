<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IgorBot</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #080c10;
      --surface: #0d1117;
      --border: #1e2d3d;
      --accent: #00f5d4;
      --accent2: #f700ff;
      --text: #c9d1d9;
      --text-dim: #5a6672;
      --user-bubble: #112240;
      --bot-bubble: #0d1f0d;
      --glow: 0 0 18px #00f5d480;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
      pointer-events: none;
      z-index: 100;
    }
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: relative;
      flex-shrink: 0;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }
    .logo-wrap { position: relative; }
    .logo {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: linear-gradient(135deg, #001a12, #003322);
      border: 1px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 18px; color: var(--accent);
      box-shadow: var(--glow);
    }
    .status-dot {
      width: 8px; height: 8px;
      background: var(--accent); border-radius: 50%;
      position: absolute; bottom: -2px; right: -2px;
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    .header-info h1 {
      font-size: 20px; font-weight: 700;
      letter-spacing: 3px; color: var(--accent);
      text-shadow: var(--glow); text-transform: uppercase;
    }
    .header-info p {
      font-size: 12px; color: var(--text-dim);
      font-family: 'Share Tech Mono', monospace; letter-spacing: 1px;
    }
    .model-tag {
      margin-left: auto;
      background: #001a12; border: 1px solid var(--accent);
      border-radius: 6px; padding: 4px 10px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; color: var(--accent); opacity: 0.7;
    }
    #chat {
      flex: 1; overflow-y: auto;
      padding: 20px 16px;
      display: flex; flex-direction: column; gap: 16px;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .msg {
      display: flex; gap: 10px;
      max-width: 82%;
      animation: fadeUp 0.25s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .avatar {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Share Tech Mono', monospace; font-size: 12px; flex-shrink: 0;
    }
    .msg.bot .avatar { background: #001a12; border: 1px solid var(--accent); color: var(--accent); }
    .msg.user .avatar { background: #1a0020; border: 1px solid var(--accent2); color: var(--accent2); }
    .bubble {
      padding: 12px 16px; border-radius: 12px;
      font-size: 15px; line-height: 1.6; font-weight: 400;
      white-space: pre-wrap; word-break: break-word;
    }
    .msg.bot .bubble {
      background: var(--bot-bubble); border: 1px solid #1a3a1a;
      border-top-left-radius: 2px; color: #b8e6b8;
    }
    .msg.user .bubble {
      background: var(--user-bubble); border: 1px solid #1e2d55;
      border-top-right-radius: 2px; color: #c8d8f8;
    }
    .typing .bubble { display: flex; gap: 5px; align-items: center; padding: 14px 18px; }
    .dot {
      width: 7px; height: 7px;
      background: var(--accent); border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1.2); }
    }
    .welcome {
      text-align: center; padding: 30px 20px;
      animation: fadeUp 0.5s ease both;
    }
    .welcome .big {
      font-size: 36px; font-weight: 700;
      letter-spacing: 6px; color: var(--accent);
      text-shadow: var(--glow);
    }
    .welcome .sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px; color: var(--text-dim);
      margin-top: 6px; letter-spacing: 2px;
    }
    .suggestions {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; margin-top: 24px;
    }
    .sug-btn {
      background: #0d1a0d; border: 1px solid var(--border);
      color: var(--text); padding: 8px 14px; border-radius: 20px;
      font-family: 'Rajdhani', sans-serif; font-size: 13px;
      cursor: pointer; transition: all 0.2s;
    }
    .sug-btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px #00f5d420; }
    footer {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      position: relative; flex-shrink: 0;
    }
    footer::before {
      content: '';
      position: absolute;
      top: -1px; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent2), transparent);
    }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    #input {
      flex: 1; background: #0a0f15;
      border: 1px solid var(--border); border-radius: 12px;
      padding: 12px 16px; color: var(--text);
      font-family: 'Rajdhani', sans-serif; font-size: 15px;
      resize: none; min-height: 46px; max-height: 120px;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
      overflow-y: auto;
    }
    #input:focus { border-color: var(--accent); box-shadow: 0 0 12px #00f5d420; }
    #input::placeholder { color: var(--text-dim); }
    #send-btn {
      width: 46px; height: 46px;
      background: linear-gradient(135deg, #003322, #001a12);
      border: 1px solid var(--accent); border-radius: 12px;
      cursor: pointer; color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0;
      box-shadow: 0 0 10px #00f5d420;
    }
    #send-btn:hover { background: var(--accent); color: var(--bg); box-shadow: var(--glow); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #send-btn svg { width: 18px; height: 18px; }
    .char-info {
      font-family: 'Share Tech Mono', monospace; font-size: 10px;
      color: var(--text-dim); text-align: right; margin-top: 5px; letter-spacing: 1px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="logo">IB</div>
    <div class="status-dot"></div>
  </div>
  <div class="header-info">
    <h1>IgorBot</h1>
    <p>// SISTEMA ONLINE — PRONTO PARA OPERAR</p>
  </div>
  <div class="model-tag">deepseek-r1:free</div>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <div class="big">IGORBOT</div>
    <div class="sub">// IA PESSOAL · POWERED BY OPENROUTER</div>
    <div class="suggestions">
      <button class="sug-btn" onclick="sendSuggestion(this)">Explique o Big Bang</button>
      <button class="sug-btn" onclick="sendSuggestion(this)">O que e evolucao?</button>
      <button class="sug-btn" onclick="sendSuggestion(this)">Me ajuda a debater ateismo</button>
      <button class="sug-btn" onclick="sendSuggestion(this)">Crie um codigo HTML</button>
    </div>
  </div>
</div>

<footer>
  <div class="input-row">
    <textarea id="input" placeholder="Digite sua mensagem..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <div class="char-info">ENTER para enviar | SHIFT+ENTER para nova linha</div>
</footer>

<script>
  var API_KEY = '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';
  var MODEL   = 'deepseek/deepseek-r1:free';
  var SYSTEM  = 'Voce e o IgorBot, uma IA inteligente, direta e sem rodeios. Voce fala portugues brasileiro, e curioso, filosofico e analitico. Voce gosta de debater ideias, questionar crencas e explorar temas como cosmologia, biologia evolutiva, filosofia e tecnologia. Seja objetivo, perspicaz e nunca superficial. Responda sempre em portugues.';

  var history = [];
  var chatEl  = document.getElementById('chat');
  var inputEl = document.getElementById('input');
  var sendBtn = document.getElementById('send-btn');

  inputEl.addEventListener('input', function() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function sendSuggestion(btn) {
    inputEl.value = btn.textContent;
    sendMessage();
  }

  function removeWelcome() {
    var w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function appendMsg(role, text) {
    removeWelcome();
    var wrap   = document.createElement('div');
    wrap.className = 'msg ' + role;
    var avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'bot' ? 'IB' : 'EU';
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function showTyping() {
    removeWelcome();
    var wrap   = document.createElement('div');
    wrap.className = 'msg bot typing';
    wrap.id = 'typing-indicator';
    var avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'IB';
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function removeTyping() {
    var t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  function sendMessage() {
    var text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    appendMsg('user', text);
    history.push({ role: 'user', content: text });
    showTyping();

    var messages = [{ role: 'system', content: SYSTEM }].concat(history);

    fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + API_KEY,
        'Content-Type': 'application/json',
        'HTTP-Referer': 'https://igorbot.app',
        'X-Title': 'IgorBot'
      },
      body: JSON.stringify({
        model: MODEL,
        messages: messages
      })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      removeTyping();

      if (data.error) {
        appendMsg('bot', 'ERRO API: ' + (data.error.message || JSON.stringify(data.error)));
        sendBtn.disabled = false;
        return;
      }

      var choice = data && data.choices && data.choices[0];
      var reply  = choice && choice.message && choice.message.content;

      if (!reply) {
        appendMsg('bot', 'Resposta vazia. Resposta da API:\n' + JSON.stringify(data, null, 2));
        sendBtn.disabled = false;
        return;
      }

      // Remove tags <think> do DeepSeek R1
      var clean = reply.replace(/<think>[\s\S]*?<\/think>/gi, '').trim();
      if (!clean) clean = reply.trim();

      history.push({ role: 'assistant', content: clean });
      appendMsg('bot', clean);
      sendBtn.disabled = false;
    })
    .catch(function(err) {
      removeTyping();
      appendMsg('bot', 'Erro de rede: ' + err.message);
      sendBtn.disabled = false;
    });
  }
</script>
</body>
</html>
